<!DOCTYPE html>
<html>
<head>
    <title>404 Page</title>

    <style>
        @import url(https://fonts.googleapis.com/css?family=opensans:500);

        body{
            background: #33cc99;
            color:#fff;
            font-family: 'Open Sans', sans-serif;
            max-height:700px;
            overflow: hidden;
        }

        .c{
            text-align: center;
            display: block;
            position: relative;
            width:80%;
            margin:100px auto;
        }

        ._404{
            font-size: 220px;
            position: relative;
            display: inline-block;
            z-index: 2;
            height: 250px;
            letter-spacing: 15px;
        }

        ._1{
            text-align:center;
            display:block;
            position:relative;
            letter-spacing: 12px;
            font-size: 4em;
            line-height: 80%;
        }

        ._2{
            text-align:center;
            display:block;
            position: relative;
            font-size: 20px;
        }

        .btn{
            background-color: rgb(255,255,255);
            display: inline-block;
            width: 358px;
            padding: 5px;
            font-size: 25px;
            margin: 10px auto;
            color:#33cc99;
            text-decoration: none;
        }

        hr{
            border: none;
            border-top: 5px solid #fff;
            margin: 0 auto;
            width: 420px;
        }

        hr:after {
            content: "\2022";
            position: relative;
            top: -0.75em;
            font-size: 2em;
            padding: 0 0.2em;
            background: #33cc99;
        }

        .cloud {
            width: 350px;
            height: 120px;
            background: #FFF;
            border-radius: 100px;
            position: absolute;
            z-index:-1;
        }

        .cloud:after, .cloud:before {
            content: '';
            position: absolute;
            background: #FFF;
        }

        .cloud:after {
            width: 100px;
            height: 100px;
            top: -50px;
            left: 50px;
            border-radius: 100px;
        }

        .cloud:before {
            width: 180px;
            height: 180px;
            top: -90px;
            right: 50px;
            border-radius: 200px;
        }

        .x1 {
            top:-50px;
            left:100px;
            transform: scale(0.3);
            opacity: 0.9;
            animation: moveclouds 15s linear infinite;
        }

        .x1_5{
            top:-80px;
            left:250px;
            transform: scale(0.3);
            animation: moveclouds 17s linear infinite;
        }

        .x2 {
            left: 250px;
            top:30px;
            transform: scale(0.6);
            opacity: 0.6; 
            animation: moveclouds 25s linear infinite;
        }

        .x3 {
            left: 250px;
            bottom: -70px;
            transform: scale(0.6);
            opacity: 0.8; 
            animation: moveclouds 25s linear infinite;
        }

        .x4 {
            left: 470px;
            bottom: 20px;
            transform: scale(0.75);
            opacity: 0.75;
            animation: moveclouds 18s linear infinite;
        }

        .x5 {
            left: 200px;
            top: 300px;
            transform: scale(0.5);
            opacity: 0.8; 
            animation: moveclouds 20s linear infinite;
        }

        @keyframes moveclouds {
            0% {margin-left: 1000px;}
            100% {margin-left: -1000px;}
        }
    </style>
</head>

<body>

    <div id="clouds">
        <div class="cloud x1"></div>
        <div class="cloud x1_5"></div>
        <div class="cloud x2"></div>
        <div class="cloud x3"></div>
        <div class="cloud x4"></div>
        <div class="cloud x5"></div>
    </div>

    <div class='c'>
        <div class='_404'>404</div>
        <hr>
        <div class='_1'>THE PAGE</div>
        <div class='_2'>WAS NOT FOUND</div>
        <a class='btn' href='#'>BACK TO HOME</a>
    </div>

</body>
</html>
